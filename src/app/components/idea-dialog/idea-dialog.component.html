<ng-container *transloco="let t">
<div class="dialog-overlay" (click)="onBackdropClick($event)">
  <div class="dialog-container">
    <!-- Dialog Header -->
    <div class="dialog-header">
      <h2 class="dialog-title">{{ isEditMode() ? t('dialog.editTitle') : t('dialog.createTitle') }}</h2>
      <button class="close-btn" (click)="onClose()">&times;</button>
    </div>

    <!-- Dialog Body -->
    <div class="dialog-body">
      <!-- Row 1: Idea Title + Idea Type -->
      <div class="form-row two-col">
        <div class="form-group">
          <label class="form-label">{{ t('dialog.ideaTitle') }}<span class="required">*</span></label>
          <input
            type="text"
            class="form-control"
            [ngModel]="formData().ideaTitle"
            (ngModelChange)="updateField('ideaTitle', $event)">
        </div>
        <div class="form-group">
          <label class="form-label">{{ t('dialog.ideaType') }}<span class="required">*</span></label>
          <select
            class="form-control"
            [ngModel]="formData().ideaType"
            (ngModelChange)="updateField('ideaType', $event)">
            <option value=""></option>
            @for (type of ideaTypeOptions; track type) {
              <option [value]="type">{{ type }}</option>
            }
          </select>
        </div>
      </div>

      <!-- Row 2: Description -->
      <div class="form-row">
        <div class="form-group full-width">
          <label class="form-label">{{ t('dialog.description') }}<span class="required">*</span></label>
          <textarea
            class="form-control textarea"
            rows="4"
            [ngModel]="formData().description"
            (ngModelChange)="updateField('description', $event)">
          </textarea>
        </div>
      </div>

      <!-- Row 3: GES Center + Contribute on behalf of -->
      <div class="form-row two-col">
        <div class="form-group">
          <label class="form-label">{{ t('dialog.gesCenter') }}<span class="required">*</span></label>
          <select
            class="form-control"
            [ngModel]="formData().gesCenter"
            (ngModelChange)="updateField('gesCenter', $event)">
            <option value=""></option>
            @for (center of gesCenterOptions; track center) {
              <option [value]="center">{{ center }}</option>
            }
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">{{ t('dialog.contributeOnBehalfOf') }}</label>
          <select
            class="form-control"
            [ngModel]="formData().contributeOnBehalfOf"
            (ngModelChange)="updateField('contributeOnBehalfOf', $event)">
            <option value="">{{ t('dialog.findItems') }}</option>
            @for (contributor of contributorOptions; track contributor) {
              <option [value]="contributor">{{ contributor }}</option>
            }
          </select>
        </div>
      </div>

      <!-- Row 4: Co-Contributors -->
      <div class="form-row">
        <div class="form-group full-width">
          <label class="form-label">{{ t('dialog.coContributors') }}</label>
          <select
            class="form-control"
            [ngModel]="formData().coContributors"
            (ngModelChange)="updateField('coContributors', $event)">
            <option value="">{{ t('dialog.coContributors') }}</option>
            @for (co of coContributorOptions; track co) {
              <option [value]="co">{{ co }}</option>
            }
          </select>
        </div>
      </div>

      <!-- Row 5: Attachments -->
      <div class="form-row">
        <div class="form-group full-width">
          <label class="form-label">{{ t('dialog.attachments') }}</label>
          <div class="attachment-box">
            @if (fileName()) {
              <p class="attachment-filename">{{ fileName() }}</p>
            } @else {
              <p class="attachment-placeholder">{{ t('dialog.nothingAttached') }}</p>
            }
            <label class="attach-btn">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="var(--color-success)">
                <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
              </svg>
              {{ t('dialog.attachFile') }}
              <input
                type="file"
                class="file-input-hidden"
                (change)="onFileSelected($event)">
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Dialog Footer -->
    <div class="dialog-footer">
      <button class="footer-btn back-btn" (click)="onClose()">{{ t('dialog.backToDashboard') }}</button>
      <button class="footer-btn reset-btn" (click)="onReset()">{{ t('dialog.reset') }}</button>
      <button class="footer-btn submit-btn" [disabled]="isSubmitting()" (click)="onSubmit()">
        @if (isSubmitting()) {
          ...
        } @else {
          {{ t('dialog.submit') }}
        }
      </button>
    </div>
  </div>
</div>
</ng-container>
