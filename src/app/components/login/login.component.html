<ng-container *transloco="let t">
<div class="login-page">
  <!-- Login Card -->
  <div class="login-wrapper">
    <div class="login-card">
      <!-- Logo -->
      <div class="card-logo">
        <img src="brand_logo.svg" [attr.alt]="t('header.brandAlt')" class="brand-logo">
      </div>

      <!-- Card Header -->
      <div class="card-header">
        <h2 class="card-title">
          {{ isSignUp() ? t('login.signUpTitle') : t('login.signInTitle') }}
        </h2>
      </div>

      <!-- Card Body -->
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">{{ t('login.usernameOrEmail') }}<span class="required">*</span></label>
          <input
            type="text"
            class="form-control"
            [placeholder]="t('login.usernameOrEmailPlaceholder')"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)">
        </div>

        <div class="form-group">
          <label class="form-label">{{ t('login.password') }}<span class="required">*</span></label>
          <input
            type="password"
            class="form-control"
            [placeholder]="t('login.passwordPlaceholder')"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)">
        </div>

        @if (isSignUp()) {
          <div class="form-group">
            <label class="form-label">{{ t('login.confirmPassword') }}<span class="required">*</span></label>
            <input
              type="password"
              class="form-control"
              [placeholder]="t('login.confirmPasswordPlaceholder')"
              [ngModel]="confirmPassword()"
              (ngModelChange)="confirmPassword.set($event)">
          </div>
        }
      </div>

      <!-- Card Footer -->
      <div class="card-footer">
        <button class="submit-btn" [disabled]="isLoading()" (click)="onSubmit()">
          @if (isLoading()) {
            ...
          } @else {
            {{ isSignUp() ? t('login.signUpBtn') : t('login.signInBtn') }}
          }
        </button>
        <p class="toggle-text">
          {{ isSignUp() ? t('login.alreadyHaveAccount') : t('login.dontHaveAccount') }}
          <a href="javascript:void(0)" (click)="toggleMode()">
            {{ isSignUp() ? t('login.signInLink') : t('login.signUpLink') }}
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
</ng-container>
